# Rate limiting: 10 requests/sec per client IP, tracked in a 10MB shared
# memory zone. This is the FIRST line of defense against a single bad
# client hammering your API — way cheaper than handling it in app code.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream tasks_api {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # Don't tell the world which nginx version you're running —
    # one less data point for an attacker fingerprinting your stack.
    server_tokens off;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Health checks: no rate limit, no access log noise.
    location /health {
        access_log off;
        proxy_pass http://tasks_api;
    }

    location / {
        # burst=20 nodelay: allow short bursts above the steady 10r/s
        # rate (browser opening 5 tabs, retry storms, etc.) without
        # queuing them — but a sustained flood still gets capped.
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://tasks_api;

        # Forward the real client info so the app's logs (and
        # X-Forwarded-For-aware code) see the real visitor, not nginx.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
